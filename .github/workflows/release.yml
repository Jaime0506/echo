name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Build + Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2

      - name: macOS system deps
        if: runner.os == 'macOS'
        run: brew install openssl

      - name: Windows system deps
        if: runner.os == 'Windows'
        run: choco install llvm -y

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "## What's Changed\n\nInitial release." > release-notes.md
          else
            printf "## What's Changed\n\n" > release-notes.md
            git log "$PREV_TAG"..HEAD --pretty=format:"* %s" >> release-notes.md
          fi

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Echo v__VERSION__"
          releaseBodyFile: release-notes.md
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
